name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Fly.io Registry
        uses: docker/login-action@v3
        with:
          registry: registry.fly.io
          username: x
          password: ${{ secrets.FLY_API_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          # Only promote :latest for stable releases (no pre-release suffix like -alpha, -rc1)
          if [[ "$tag" != *-* ]]; then
            echo "latest_tag=registry.fly.io/pistachiorama-opencode:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          platforms: linux/amd64
          tags: |
            registry.fly.io/pistachiorama-opencode:${{ steps.version.outputs.tag }}
            ${{ steps.version.outputs.latest_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract binary for sprite bootstrap
        run: |
          PUSHED_TAG="registry.fly.io/pistachiorama-opencode:${{ steps.version.outputs.tag }}"
          docker pull "$PUSHED_TAG"
          docker create --name tmp-extract "$PUSHED_TAG"
          docker cp tmp-extract:/usr/local/bin/opencode ./opencode-linux-x64
          docker rm tmp-extract
          chmod +x opencode-linux-x64
          file opencode-linux-x64

      - name: Upload binary to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: opencode-linux-x64
          fail_on_unmatched_files: true
