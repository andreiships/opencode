name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Fly.io Registry
        uses: docker/login-action@v3
        with:
          registry: registry.fly.io
          username: x
          password: ${{ secrets.FLY_API_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          # Only promote :latest for stable releases (no pre-release suffix like -alpha, -rc1)
          if [[ "$tag" != *-* ]]; then
            echo "latest_tag=registry.fly.io/pistachiorama-opencode:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          platforms: linux/amd64
          tags: |
            registry.fly.io/pistachiorama-opencode:${{ steps.version.outputs.tag }}
            ${{ steps.version.outputs.latest_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
