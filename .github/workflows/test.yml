name: test

on:
  push:
    branches:
      - dev
  pull_request:
  workflow_dispatch:
jobs:
  unit:
    name: unit (linux)
    runs-on: ubicloud-standard-2
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: ./.github/actions/setup-bun
        with:
          cache-token: ${{ secrets.TURBO_CACHE_TOKEN }}
          axiom-token: ${{ secrets.AXIOM_API_TOKEN }}

      - name: Configure git identity
        run: |
          git config --global user.email "bot@opencode.ai"
          git config --global user.name "opencode"

      - name: Run unit tests
        run: bun turbo test

      - name: Generate coverage report
        if: "!cancelled()"
        continue-on-error: true
        run: bun --cwd packages/opencode test --coverage --coverage-reporter=lcov --timeout 30000

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: always()
        with:
          files: packages/opencode/coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload coverage artifact
        if: "!cancelled()"
        uses: actions/upload-artifact@v4
        with:
          name: typescript-coverage
          path: packages/opencode/coverage/lcov.info
          if-no-files-found: ignore

  e2e:
    name: e2e (linux)
    # No `needs: unit` — runs in parallel with unit to reduce wall-clock time.
    # The `required` gate below still enforces both must pass before merge.
    runs-on: ubicloud-standard-2
    env:
      PLAYWRIGHT_BROWSERS_PATH: 0
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: ./.github/actions/setup-bun
        with:
          cache-token: ${{ secrets.TURBO_CACHE_TOKEN }}
          axiom-token: ${{ secrets.AXIOM_API_TOKEN }}

      - name: Install Playwright browsers
        working-directory: packages/app
        run: bunx playwright install --with-deps

      - name: Run app e2e tests
        run: bun --cwd packages/app test:e2e:local
        env:
          CI: true
        timeout-minutes: 30

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-linux-${{ github.run_attempt }}
          if-no-files-found: ignore
          retention-days: 7
          path: |
            packages/app/e2e/test-results
            packages/app/e2e/playwright-report

  diff-cover-enforcement:
    name: Enforce 80% Patch Coverage
    needs: [unit]
    if: always() && !cancelled() && github.event_name == 'pull_request' && needs.unit.result == 'success'
    runs-on: ubicloud-standard-2
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: typescript-coverage
          path: coverage/

      - name: Diff cover check
        uses: andreiships/pistachiorama/.github/actions/diff-cover-check@main
        with:
          threshold: '80'
          coverage-file: coverage/lcov.info
          compare-branch: origin/${{ github.base_ref }}

  required:
    name: test (linux)
    runs-on: ubicloud-standard-2
    needs:
      - unit
      - e2e
      - diff-cover-enforcement
    if: always()
    steps:
      - name: Verify upstream test jobs passed
        run: |
          echo "unit=${{ needs.unit.result }}"
          echo "e2e=${{ needs.e2e.result }}"
          echo "diff-cover=${{ needs.diff-cover-enforcement.result }}"
          test "${{ needs.unit.result }}" = "success"
          test "${{ needs.e2e.result }}" = "success"
          # diff-cover only runs on PRs; skipped on push-to-dev
          test "${{ needs.diff-cover-enforcement.result }}" = "success" -o "${{ needs.diff-cover-enforcement.result }}" = "skipped"
