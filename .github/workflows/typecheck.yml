name: typecheck

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]
  workflow_dispatch:

jobs:
  typecheck:
    runs-on: ubicloud-standard-2
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: ./.github/actions/setup-bun
        with:
          cache-token: ${{ secrets.TURBO_CACHE_TOKEN }}
          axiom-token: ${{ secrets.AXIOM_API_TOKEN }}

      - name: Run typecheck
        run: bun typecheck
