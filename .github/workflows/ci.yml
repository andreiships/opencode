name: CI

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/dev' }}

jobs:
  lint:
    name: Lint (Prettier)
    runs-on: ubicloud-standard-2
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - run: bun install --frozen-lockfile
      - name: Prettier check
        run: bunx prettier --check .

  ci-pass:
    name: CI Pass
    runs-on: ubicloud-standard-2
    if: always()
    needs: [lint]
    steps:
      - name: Check all jobs passed
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: |
          echo "$RESULTS" | jq -e '[.[].result] | all(. == "success" or . == "skipped")' > /dev/null || exit 1
