name: Lint Workflows

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
      - ".github/actionlint.yaml"
  push:
    branches: [dev]
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
      - ".github/actionlint.yaml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/dev' }}

jobs:
  actionlint:
    name: Lint GitHub Actions Workflows
    runs-on: ubicloud-standard-2
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Download actionlint
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.11
          echo "${{ github.workspace }}" >> "$GITHUB_PATH"

      - name: Run actionlint
        # Disable shellcheck integration — upstream workflow run: blocks have
        # numerous SC2086/SC2140/SC2155 warnings that are not worth fixing in a fork.
        run: actionlint -color -shellcheck=
