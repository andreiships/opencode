name: "Setup Bun"
description: "Setup Bun and install dependencies, with optional R2 node_modules caching"

inputs:
  cache-token:
    description: "Bearer token for R2 cache (cache.pistachiorama.ai). Leave empty to skip caching."
    required: false
    default: ""
  axiom-token:
    description: "Axiom API token for cache telemetry. Leave empty to skip metrics."
    required: false
    default: ""

outputs:
  cache-hit:
    description: "Whether node_modules were restored from cache (bun install was skipped)"
    value: ${{ steps.restore.outputs.cache-hit || 'false' }}

runs:
  using: "composite"
  steps:
    - name: Get baseline download URL
      id: bun-url
      shell: bash
      run: |
        if [ "$RUNNER_ARCH" = "X64" ]; then
          V=$(node -p "require('./package.json').packageManager.split('@')[1]")
          case "$RUNNER_OS" in
            macOS)   OS=darwin ;;
            Linux)   OS=linux ;;
            Windows) OS=windows ;;
          esac
          echo "url=https://github.com/oven-sh/bun/releases/download/bun-v${V}/bun-${OS}-x64-baseline.zip" >> "$GITHUB_OUTPUT"
        fi

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version-file: ${{ !steps.bun-url.outputs.url && 'package.json' || '' }}
        bun-download-url: ${{ steps.bun-url.outputs.url }}

    - name: Get cache directory
      id: cache
      shell: bash
      run: echo "dir=$(bun pm cache)" >> "$GITHUB_OUTPUT"

    - name: Cache Bun dependencies
      uses: actions/cache@v4
      with:
        path: ${{ steps.cache.outputs.dir }}
        key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-

    - name: Install setuptools for distutils compatibility
      run: python3 -m pip install setuptools || pip install setuptools || true
      shell: bash

    - name: Restore node_modules from R2
      id: restore
      if: inputs.cache-token != ''
      uses: andreiships/shared-ai-standards/.github/actions/r2-cache@41b2466c374cddf778ed0ea5bb2d08db7d9939d7 # main
      with:
        action: restore
        key: opencode/node-modules/${{ runner.os }}/${{ hashFiles('**/bun.lock') }}
        path: |
          node_modules
          packages/*/node_modules
          packages/console/*/node_modules
          packages/sdk/*/node_modules
          sdks/*/node_modules
        cache-token: ${{ inputs.cache-token }}
        axiom-token: ${{ inputs.axiom-token }}
        metrics-script: scripts/ci/r2-cache-metrics.sh

    - name: Install dependencies
      if: steps.restore.outputs.cache-hit != 'true'
      run: |
        # Workaround for patched peer variants
        # e.g. ./patches/ for standard-openapi
        # https://github.com/oven-sh/bun/issues/28147
        if [ "$RUNNER_OS" = "Windows" ]; then
          bun install --linker hoisted
        else
          bun install
        fi
      shell: bash

    - name: Save node_modules to R2
      if: inputs.cache-token != '' && steps.restore.outputs.cache-hit != 'true'
      uses: andreiships/shared-ai-standards/.github/actions/r2-cache@41b2466c374cddf778ed0ea5bb2d08db7d9939d7 # main
      with:
        action: save
        key: opencode/node-modules/${{ runner.os }}/${{ hashFiles('**/bun.lock') }}
        path: |
          node_modules
          packages/*/node_modules
          packages/console/*/node_modules
          packages/sdk/*/node_modules
          sdks/*/node_modules
        cache-token: ${{ inputs.cache-token }}
        axiom-token: ${{ inputs.axiom-token }}
        metrics-script: scripts/ci/r2-cache-metrics.sh
