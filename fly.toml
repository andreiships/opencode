# Fly.io configuration for pistachiorama-opencode
#
# Headless OpenCode server for the Rust DO's SandboxMcpExecutor.
# The DO provisions a Fly Machine from this app and calls
# POST /session/:id/tool/call for edit/write/patch tools.

app = "pistachiorama-opencode"
primary_region = "sjc"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "performance-2x"

[[mounts]]
  source = "opencode_data"
  destination = "/root/.config/opencode"
